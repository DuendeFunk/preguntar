    <script>
        tailwind.config = {

    <style>
        /* ----------------------------------------------------
           CSS Base Tema Oscuro (Glassmorphism + Grano)
           ---------------------------------------------------- */
        :root {
            --bg-body: #050505;
            --bg-card: rgba(20, 20, 20, 0.4);
            --bg-main-box: transparent;
            --bg-video: rgba(20, 20, 20, 0.4);
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --text-inverse: #000000;
            --border-color: rgba(255, 255, 255, 0.08);
            --btn-hover-bg: rgba(40, 40, 40, 0.6);
            
            --brand-yt: #FF0000;
            --brand-tk: #00F2FE;
            --brand-ig: #E1306C;
            --brand-mp: #009EE3;

            --font-display: 'Syncopate', sans-serif;
            --font-body: 'Outfit', sans-serif;
            --text-uppercase: uppercase;
            
            --border-width: 1px;
            --border-radius: 24px;
            --card-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
            --card-shadow-hover: 0 10px 40px -10px rgba(0,0,0,0.8);
            --main-shadow: none;
            --transition-speed: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            --card-hover-transform: translateY(-6px) scale(1.02);
            --card-hover-border: var(--brand-color);
            
            --backdrop-blur: blur(24px);
            
            --toast-bg: rgba(15,15,15,0.9);
            --toast-text: #ffffff;
            --toast-border: 1px solid rgba(255,255,255,0.1);
            --toast-backdrop: blur(16px);
            
            --icon-color-override: var(--brand-color);
            --icon-bg-override: rgba(255,255,255,0.05);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        h1, h2, h3, .font-display {
            font-family: var(--font-display);
            text-transform: var(--text-uppercase);
        }

        /* ----------------------------------------------------
           Fondo Dinámico y Textura Granulada
           ---------------------------------------------------- */
        .bg-dynamic {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3;
            background: linear-gradient(135deg, #050505 0%, #150918 50%, #030815 100%);
            background-size: 300% 300%;
            animation: gradientMove 15s ease infinite alternate;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2;
            background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 60%);
            animation: breathe 8s ease-in-out infinite alternate;
            pointer-events: none;
        }

        /* OVERLAY DE TEXTURA GRANULADA (GRAIN) */
        .noise-overlay {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 50;
            pointer-events: none; /* Allows clicks to pass through */
            opacity: 0.12; /* Ajustar intensidad del grano aquí */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            animation: grain 1.2s steps(4) infinite;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-2%, 2%); }
            50% { transform: translate(-2%, -2%); }
            75% { transform: translate(2%, 2%); }
        }

        /* ANIMACIÓN DEL TÍTULO (Interferencia) */
        @keyframes titleInterference {
            0%, 100% { transform: translateY(0); text-shadow: 0 0 15px rgba(255,255,255,0.1); }
            25% { transform: translateY(-4px); text-shadow: 3px 2px 12px rgba(0, 242, 254, 0.5), -3px -2px 12px rgba(225, 48, 108, 0.5); }
            50% { transform: translateY(0); text-shadow: 0 0 15px rgba(255,255,255,0.1); }
            75% { transform: translateY(4px); text-shadow: -3px 2px 12px rgba(255, 0, 0, 0.5), 3px -2px 12px rgba(0, 158, 227, 0.5); }
        }

        .title-animated {
            display: inline-block;
            animation: titleInterference 6s ease-in-out infinite;
        }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes breathe { 0% { transform: scale(1); opacity: 0.6;} 100% { transform: scale(1.15); opacity: 1;} }

        /* ----------------------------------------------------
           Componentes UI (Glassmorphism)
           ---------------------------------------------------- */
        .theme-main-box {
            background-color: var(--bg-main-box);
            border: var(--border-width) solid var(--border-color);
            border-radius: calc(var(--border-radius) * 1.5);
            box-shadow: var(--main-shadow);
        }

        .theme-card {
            background-color: var(--bg-card);
            border: var(--border-width) solid var(--border-color);
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            transition: all var(--transition-speed);
            backdrop-filter: var(--backdrop-blur, none);
            -webkit-backdrop-filter: var(--backdrop-blur, none);
            color: var(--text-main);
        }

        .theme-card:hover {
            transform: var(--card-hover-transform);
            box-shadow: var(--card-shadow-hover);
            border-color: var(--card-hover-border);
            background-color: var(--btn-hover-bg);
            z-index: 10;
        }

        .theme-video-container {
            background-color: var(--bg-video);
            border: var(--border-width) solid var(--border-color);
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            transition: all var(--transition-speed);
            backdrop-filter: var(--backdrop-blur, none);
            overflow: hidden;
            padding: calc(var(--border-width) * 2);
        }

        .theme-video-inner {
            border: var(--border-width) solid var(--border-color);
            border-radius: calc(var(--border-radius) / 1.5);
            overflow: hidden;
            position: relative;
            background-color: #000;
        }

        .theme-avatar {
            border: var(--border-width) solid var(--border-color);
            border-radius: 50%;
            transition: filter var(--transition-speed);
            height: 100%; width: 100%;
        }

        .theme-icon-box {
            background-color: var(--icon-bg-override);
            border: var(--border-width) solid rgba(255,255,255,0.1);
            border-radius: calc(var(--border-radius) / 1.5);
            color: var(--icon-color-override);
        }

        /* Resplandores y Colores de Marca */
        .btn-yt { --brand-color: var(--brand-yt); }
        .btn-tk { --brand-color: var(--brand-tk); }
        .btn-ig { --brand-color: var(--brand-ig); }
        .btn-mp { --brand-color: var(--brand-mp); }

        .btn-yt:hover { box-shadow: 0 0 40px rgba(255,0,0,0.15); border-color: rgba(255,0,0,0.4); }
        .btn-tk:hover { box-shadow: 0 0 40px rgba(0,242,254,0.15); border-color: rgba(0,242,254,0.4); }
        .btn-ig:hover { box-shadow: 0 0 40px rgba(225,48,108,0.15); border-color: rgba(225,48,108,0.4); }
        .btn-mp:hover { box-shadow: 0 0 40px rgba(0,158,227,0.2);  border-color: rgba(0,158,227,0.5); }
        
        /* Toast Notification */
        #toast {
            visibility: hidden; min-width: 250px; margin-left: -125px;
            background: var(--toast-bg); border: var(--toast-border);
            color: var(--toast-text); text-align: center; padding: 16px 24px;
            position: fixed; z-index: 100; left: 50%; bottom: 30px;
            border-radius: var(--border-radius); font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: var(--main-shadow); opacity: 0; transition: all 0.3s; transform: translateY(20px);
            backdrop-filter: var(--toast-backdrop, none);
        }
        #toast.show { visibility: visible; opacity: 1; transform: translateY(0); bottom: 50px; }
    </style>
</head>

    <!-- Toast Notification -->

    <!-- Interface & Logic -->
    <script>
        // --- Analytics Mock Simulator ---
        function trackEvent(action, category, label) {
            console.log(`[Analytics] Action: ${action} | Category: ${category} | Label: ${label}`);
        }

        // --- Clipboard & Toast Logic ---
        const btnGorra = document.getElementById('btn-gorra');
        const aliasText = 'repartobuenaonda';
        const toast = document.getElementById('toast');
        let toastTimeout;

        function showToast() {
            clearTimeout(toastTimeout);
            toast.classList.add('show');
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        btnGorra.addEventListener('click', () => {
            trackEvent('Click', 'Monetization', 'Copy Alias initiated');
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(aliasText).then(() => {
                    showToast();
                }).catch(err => {
                    fallbackCopy(aliasText);
                });
            } else {
                fallbackCopy(aliasText);
            }
        });

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; textArea.style.left = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {}
            textArea.remove();
        }

        // --- YouTube Deep Linking Logic ---
        document.addEventListener('DOMContentLoaded', () => {
            const ytLink = document.getElementById('link-youtube');
            const ytUsername = 'DUENDEFUNK-11-11';
            const webUrl = `https://www.youtube.com/@${ytUsername}`;
            
            ytLink.addEventListener('click', (e) => {
                e.preventDefault();
                trackEvent('Click', 'Social', 'YouTube DeepLink Click');
                
                const userAgent = navigator.userAgent || navigator.vendor || window.opera;
                const isAndroid = /android/i.test(userAgent);
                const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

                if (!(isAndroid || isIOS)) {
                    window.open(webUrl, '_blank');
                    return;
                }

                let appUrl = isIOS ? `vnd.youtube://www.youtube.com/@${ytUsername}` : `intent://www.youtube.com/@${ytUsername}#Intent;package=com.google.android.youtube;scheme=https;end`;

                const now = Date.now();
                const timeout = setTimeout(() => {
                    if (Date.now() - now < 2500) window.location.href = webUrl;
                }, 2000);

                window.location.href = appUrl;

                document.addEventListener("visibilitychange", function handleChange() {
                    if (document.hidden) clearTimeout(timeout);
                    document.removeEventListener("visibilitychange", handleChange);
                });
                window.addEventListener('blur', () => clearTimeout(timeout));
            });
        });
    </script>
